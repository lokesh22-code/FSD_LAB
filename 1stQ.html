<!-- Create an HTML document that includes an ordered list, an unordered list, nested lists, 
and a definition list. Additionally, demonstrate the use of hyperlinks using the <a> tag 
with href and target attributes.  -->
<!DOCTYPE html>

<html>
<head>
    <title>Lists and Links</title>
</head>
<body>

<h3>Ordered List</h3>
<ol>
    <li>Item 1</li>
    <li>Item 2</li>
</ol>

<h3>Unordered List</h3>
<ul>
    <li>Apple</li>
    <li>Banana</li>
</ul>

<h3>Nested List</h3>
<ul>
    <li>Fruits
        <ul>
            <li>Mango</li>
            <li>Orange</li>
        </ul>
    </li>
    <li>Vegetables
        <ul>
            <li>Carrot</li>
            <li>Broccoli</li>
        </ul>
    </li>

</ul>

<h3>Definition List</h3>
<dl>
    <dt>HTML</dt>
    <dd>Hyper Text Markup Language</dd>
    <dt>CSS</dt>
    <dd>Cascading Style Sheets</dd>
</dl>

<h3>Hyperlink</h3>
<a href="https://www.google.com" target="_blank">Visit Google</a>

</body>
</html>
