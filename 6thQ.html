<!-- Develop an HTML page that displays images as 100x100 pixel thumbnails. Each 
thumbnail should link to the full-sized image, creating an image gallery effect. -->
<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>
</head>
<body>

    <h2>My Photo Gallery</h2>
    <p>Click on a thumbnail to view the full-sized image:</p>

    <a href="https://via.placeholder.com/800x600/FF5733" target="_blank">
        <img src="https://via.placeholder.com/800x600/FF5733" width="100" height="100" alt="Red Image" border="1">
    </a>

    <a href="https://via.placeholder.com/800x600/33FF57" target="_blank">
        <img src="https://via.placeholder.com/800x600/33FF57" width="100" height="100" alt="Green Image" border="1">
    </a>

    <a href="https://via.placeholder.com/800x600/3357FF" target="_blank">
        <img src="https://via.placeholder.com/800x600/3357FF" width="100" height="100" alt="Blue Image" border="1">
    </a>

</body>
</html>
