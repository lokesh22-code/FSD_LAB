<!-- Create an HTML form for user registration that includes text fields, a password field, a 
date of birth field, checkboxes, radio buttons, list boxes using <select> and <option> tags, 
a <textarea>, and submit and reset buttons. Use tables to enhance the form's layout.  -->
<!DOCTYPE html>
<html>
<body>

    <h2>User Registration</h2>

    <form action="/submit_form" method="post">
        <table border="0" cellpadding="5">
            
            <tr>
                <td>Full Name:</td>
                <td><input type="text" name="fullname" placeholder="Enter your name" required></td>
            </tr>

            <tr>
                <td>Password:</td>
                <td><input type="password" name="userpass" required></td>
            </tr>

            <tr>
                <td>Date of Birth:</td>
                <td><input type="date" name="dob"></td>
            </tr>

            <tr>
                <td>Gender:</td>
                <td>
                    <input type="radio" name="gender" value="male"> Male
                    <input type="radio" name="gender" value="female"> Female
                </td>
            </tr>

            <tr>
                <td>Country:</td>
                <td>
                    <select name="country">
                        <option value="usa">USA</option>
                        <option value="uk">UK</option>
                        <option value="india">India</option>
                        <option value="canada">Canada</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Interests:</td>
                <td>
                    <input type="checkbox" name="interest" value="coding"> Coding
                    <input type="checkbox" name="interest" value="music"> Music
                    <input type="checkbox" name="interest" value="sports"> Sports
                </td>
            </tr>

            <tr>
                <td>Bio / Comments:</td>
                <td>
                    <textarea name="bio" rows="4" cols="30" placeholder="Tell us about yourself..."></textarea>
                </td>
            </tr>

            <tr>
                <td></td>
                <td>
                    <input type="submit" value="Register">
                    <input type="reset" value="Clear Form">
                </td>
            </tr>

        </table>
    </form>

</body>
</html>
