<!-- Embed audio and video elements into an HTML webpage using the appropriate HTML5 
tags. Ensure that the media controls are available for user interaction.  -->

<!DOCTYPE html>
<html>
<body>

<h3>Audio</h3>
<audio id="a" controls autoplay loop src="audio.mp3"></audio><br>
<button onclick="a.currentTime-=2">⏪</button>
<button onclick="a.currentTime+=2">⏩</button>
<button onclick="a.playbackRate=0.5">0.5x</button>
<button onclick="a.playbackRate=1">1x</button>
<button onclick="a.playbackRate=2">2x</button>
<button onclick="a.muted=!a.muted">🔇 Mute</button>

<h3>Video</h3>
<video id="v" controls autoplay loop width="300" src="video.mp4"></video><br>
<button onclick="v.currentTime-=2">⏪</button>
<button onclick="v.currentTime+=2">⏩</button>
<button onclick="v.playbackRate=0.5">0.5x</button>
<button onclick="v.playbackRate=1">1x</button>
<button onclick="v.playbackRate=2">2x</button>
<button onclick="v.muted=!v.muted">🔇 Mute</button>

</body>
</html>
